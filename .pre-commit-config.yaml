# Local hooks run by prek (https://github.com/j178/prek), a fast Rust drop-in
# for pre-commit that reads this same file. Set up once with `prek install`;
# run on demand with `prek run --all-files`. (`pre-commit` works unchanged too.)
#
# Each `rev` is pinned to a commit SHA (tag in the trailing comment) so a
# repointed tag cannot silently change the code these hooks run. To update:
#
#     prek autoupdate && ./scripts/pin-precommit-shas.sh
#
# autoupdate moves revs to the latest tags; the script re-pins them to SHAs.
repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # Python lint + format -- mirrors the CI ruff steps (auto-fixes locally)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230 # v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Keep uv.lock in sync with pyproject.toml
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: fe063293315003e95dff96d43c4928f8799a5c62 # 0.11.21
    hooks:
      - id: uv-lock

  # Validate pyproject.toml against the PEP 621 / build-system / tool schemas
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7 # v0.25
    hooks:
      - id: validate-pyproject

  # GitHub Actions workflow lint + security (same tools used to validate the workflows)
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9 # v1.25.2
    hooks:
      - id: zizmor

  # Shell script formatting + linting (scripts/*.sh)
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 05c1426671b9237fb5e1444dd63aa5731bec0dfb # v3.13.1-1
    hooks:
      - id: shfmt
        # Formatting options (2-space indent + indented case alternatives -- the
        # Google Shell Style rules) live in .editorconfig; passing them as flags
        # here would make shfmt ignore .editorconfig. `-w` just writes fixes.
        args: [-w]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # v0.11.0.1
    hooks:
      - id: shellcheck

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks

  # Fail if any hook `rev:` is a bare tag instead of a commit SHA -- catches a
  # `prek autoupdate` that was not followed by ./scripts/pin-precommit-shas.sh.
  - repo: local
    hooks:
      - id: rev-must-be-sha
        name: pre-commit revs must be SHA-pinned (run ./scripts/pin-precommit-shas.sh)
        language: pygrep
        files: '^\.pre-commit-config\.yaml$'
        # Matches a rev: whose value has a non-hex char (i.e. a tag, not a SHA).
        entry: '(?m)^\s*rev:\s+[0-9a-fA-F]*[^0-9a-fA-F\s#]'

# Type-checking (mypy) and tests (pytest) are intentionally NOT pre-commit
# hooks: both are version-dependent, so a single-version local run can pass
# while CI's Python matrix fails. They live in the matrixed CI jobs; run them
# locally on demand with `uv run mypy` / `uv run pytest`.
